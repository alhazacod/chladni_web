<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación Figuras de Chladni</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <canvas id="glCanvas"></canvas>

        <div id="controls">

            <!-- AUDIO SECTION -->
            <div class="section-title">Input Sonoro</div>

            <div class="control-group">
                <button id="btnMic">🎙 Usa tu Microfono</button>

                <label class="file-label" for="inputFile">♪ Cargar Archivo de Audio</label>
                <input type="file" id="inputFile" accept="audio/*">

                <button id="btnStopAudio">■ Detener Audio</button>
                <p id="audioStatus" class="audio-status"></p>
            </div>

            <!-- VU meter / frequency visualizer -->
            <canvas id="vuCanvas" width="240" height="48"></canvas>

            <!-- MANUAL CONTROLS -->
            <div class="section-title">Controles Manuales</div>

            <div class="control-group">
                <label>Frecuencia (ω): <span id="valFreq">19.0</span></label>
                <input type="range" id="sliderFreq" min="10" max="100" step="0.5" value="19" autocomplete="off">
            </div>

            <div class="control-group">
                <label>Particulas: <span id="valParticles">10000</span></label>
                <input type="range" id="sliderParticles" min="1000" max="30000" step="1000" value="10000" autocomplete="off">
                <button id="btnRstPrtclPos">Reiniciar Posicion de las Particulas</button>
            </div>

            <div class="control-group">
                <label>Condiciones de Frontera:</label>
                <select id="selectBC" autocomplete="off">
                    <option value="dirichlet">Dirichlet (Bordes Fijos)</option>
                    <option value="neumann">Neumann (Bordes Libres)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Numero de Fuentes: <span id="valSources">1</span></label>
                <input type="range" id="sliderSources" min="1" max="10" step="1" value="1" autocomplete="off">
            </div>

            <button id="btnEvenSources">Distribuir Fuentes Uniformemente</button>
            <p class="hint">Puedes cambiar la posicion de las fuentes manteniendo el click presionado.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
